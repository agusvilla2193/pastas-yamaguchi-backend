services:
  db:
    image: postgres:15-alpine
    container_name: dojo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dojo-backend
    restart: always
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - DB_HOST=db # Importante: aquí 'db' es el nombre del servicio de arriba
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data:
